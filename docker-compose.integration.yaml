services:
  mastodon-db:
    image: postgres:17-alpine
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: mastodon
      POSTGRES_PASSWORD: mastodon
      POSTGRES_DB: mastodon_production
    volumes:
      - mastodon_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastodon"]
      interval: 3s
      timeout: 2s
      retries: 20
    networks:
      - mastodon

  mastodon-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - mastodon_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
    networks:
      - mastodon

  mastodon-setup:
    image: ghcr.io/mastodon/mastodon:v4.5.8
    env_file: ./docker/mastodon.env
    # `db:prepare` creates the schema on first run and is a no-op afterwards,
    # so this service is safe to leave in `depends_on` long-term.
    command: bundle exec rake db:prepare
    depends_on:
      mastodon-db:
        condition: service_healthy
      mastodon-redis:
        condition: service_healthy
    restart: "no"
    networks:
      - mastodon

  mastodon-web:
    image: ghcr.io/mastodon/mastodon:v4.5.8
    restart: unless-stopped
    env_file: ./docker/mastodon.env
    command: bundle exec puma -C config/puma.rb
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      mastodon-db:
        condition: service_healthy
      mastodon-redis:
        condition: service_healthy
      mastodon-setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:3000/health 2>/dev/null | grep -q OK || exit 1"
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - mastodon

  mastodon-sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.5.8
    restart: unless-stopped
    env_file: ./docker/mastodon.env
    command: bundle exec sidekiq
    depends_on:
      mastodon-db:
        condition: service_healthy
      mastodon-redis:
        condition: service_healthy
      mastodon-setup:
        condition: service_completed_successfully
    networks:
      - mastodon

  mastodon-bootstrap:
    image: ghcr.io/mastodon/mastodon:v4.5.8
    env_file: ./docker/mastodon.env
    user: "root"
    volumes:
      - ./docker/mastodon-bootstrap.sh:/fediway-bootstrap.sh:ro
      - ./docker/mastodon-token:/token
    entrypoint: ["/bin/bash", "/fediway-bootstrap.sh"]
    depends_on:
      mastodon-web:
        condition: service_healthy
    restart: "no"
    networks:
      - mastodon

volumes:
  mastodon_db:
  mastodon_redis:

networks:
  mastodon:
    driver: bridge
