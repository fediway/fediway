name: CI

on:
  push:
    branches: [main, refactor]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 1
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev mold
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo clippy --workspace --locked -- -D warnings
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fediway
          POSTGRES_PASSWORD: fediway
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: fediway
      DB_PASS: fediway

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev mold
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Run all tests (unit + integration)
        run: cargo nextest run --workspace --locked --profile ci
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

      - name: Run doctests
        run: cargo test --doc --workspace --locked

  deploy:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/refactor')

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fediway/fediway
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
